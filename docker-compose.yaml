  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: embeddings_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d embeddings_demo']
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./import:/app/import
    ports:
      - '3000:3000'
    user: ${UID:-1000}:${GID:-1000}
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/embeddings_demo
      EMBEDDINGS_API_URL: http://embeddings:80
      EMBEDDING_DIM: '1024'
    depends_on:
      postgres:
        condition: service_healthy
#      embeddings:
#        condition: service_started
    command: sh -c "npm install && npm run db:migrate && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  pgdata: